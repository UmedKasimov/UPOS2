# Railway: не задавайте Root Directory (оставьте корень репозитория) — используется этот Dockerfile.
# Тогда Railpack не нужен: сборка через Docker из pyweb/requirements.txt и pyweb/upos.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
