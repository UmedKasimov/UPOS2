# Railway: установите корень сервиса (Root Directory) = pyweb — этот файл и Dockerfile лежат здесь.
# См. .env.example в корне репозитория — список переменных.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
