{% macro empty_state(title, description, action_href=None, action_label=None) %}
  <div class="empty-state">
    <div class="empty-state-card">
      <div class="empty-state-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9" rx="1" opacity="0.35" />
          <rect x="14" y="3" width="7" height="5" rx="1" opacity="0.5" />
          <rect x="14" y="12" width="7" height="9" rx="1" opacity="0.35" />
          <rect x="3" y="16" width="7" height="5" rx="1" opacity="0.5" />
          <path d="M12 8v8M8 12h8" stroke-width="1.25" opacity="0.85" />
        </svg>
      </div>
      <h2 class="empty-state-title">{{ title }}</h2>
      <p class="empty-state-text">{{ description }}</p>
      {% if action_href and action_label %}
        <a href="{{ action_href }}" class="btn btn-secondary empty-state-action">{{ action_label }}</a>
      {% endif %}
    </div>
  </div>
{% endmacro %}
