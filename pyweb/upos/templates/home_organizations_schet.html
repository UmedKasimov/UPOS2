{% extends "base.html" %}
{% block title %}{{ _('general.schet.title_page') }}{% endblock %}

{% block page_header %}
  <div class="general-page-header">
    <span class="general-page-kicker">{{ _('general.mode') }}</span>
    <h1 class="page-title settings-ios-page-title">{{ _('nav.account') }}</h1>
  </div>
{% endblock %}

{% block extra_head %}
  <meta name="csrf-token" content="{{ csrf_token }}" />
  <link rel="stylesheet" href="{{ url_for('static', path='general-kassa-page.css') }}?v=25" />
{% endblock %}

{% block main %}
  <div class="organizations-page-wrap organizations-page-wrap--fluid">
    <script type="application/json" id="general-schet-orgs">{{ organizations_for_filters | tojson }}</script>
    <div id="general-schet-root" class="general-schet-root"></div>
  </div>

  <script src="{{ url_for('static', path='general-schet-page.js') }}?v=15" defer></script>
{% endblock %}
